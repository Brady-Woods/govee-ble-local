sku: H5083
name: Govee Smart Plug

# Confirmed real advertised name: "ihoment_H5083_A2D1".
match:
  local_name_prefixes: ["ihoment_H5083"]

# Performs the real e7/PSK/AES-RC4 handshake at every connect, but every
# frame afterward is plaintext (checksum-verified, no decryption needed) -
# the same "vestigial handshake" pattern as H61A8/H6047/H6008. Uses
# H6006's color-family layout by convention (this device has no color
# capability to actually exercise it, so the value is inert - see
# capabilities below), but power uses a DIFFERENT encoding than every
# light/strip device: `plug_relay` (`33 01 0x10|0x11`) instead of
# `binary` (`33 01 0x00|0x01`). See PROTOCOL.md §15.3.
protocol:
  encryption: handshake_only
  color_scheme: h6006
  status_scheme: none
  power_scheme: plug_relay

# A smart plug: on/off only. No brightness, no color, no zones, no
# segments, no scenes.
capabilities:
  brightness: false
  scenes: false

notes: NOTES.md
