name: CI

on:
  push:
  pull_request:
  release:
    types: [published]

jobs:
  quality:
    name: Type-check & tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Run quality gate
        run: bash scripts/check.sh
